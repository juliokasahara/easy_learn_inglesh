<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>EasyLearn English</title>
  <link rel="stylesheet" href="popup.css" />
  <script>
    (function () {
      chrome.storage.sync.get('easylearn_config', function (res) {
        var t = (res && res.easylearn_config && res.easylearn_config.theme) || 'espresso';
        document.documentElement.dataset.theme = t;
      });
    })();
  </script>
  <style>
    body { width: 240px; min-height: auto; }
    .popup-launch {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 16px 20px;
      gap: 10px;
    }
    .stats-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }
    .stat-chip {
      flex: 1;
      background: #313244;
      border-radius: 8px;
      padding: 8px 6px;
      text-align: center;
    }
    .stat-chip-value {
      font-size: 18px;
      font-weight: 800;
      color: #89b4fa;
      line-height: 1;
    }
    .stat-chip-label {
      font-size: 10px;
      color: #6c7086;
      margin-top: 3px;
    }
    .stat-chip.due .stat-chip-value { color: #f9e2af; }
  </style>
</head>
<body>
  <div class="container">
    <header class="app-header">
      <div class="app-logo">E</div>
      <div>
        <h1 class="app-title">EasyLearn English</h1>
        <p class="app-subtitle">Clique para estudar</p>
      </div>
    </header>

    <div class="popup-launch">
      <div class="stats-row">
        <div class="stat-chip">
          <div class="stat-chip-value" id="stat-history">–</div>
          <div class="stat-chip-label">no histórico</div>
        </div>
        <div class="stat-chip due">
          <div class="stat-chip-value" id="stat-due">–</div>
          <div class="stat-chip-label">para revisar</div>
        </div>
      </div>
      <button class="primary-btn" id="open-page">📚 Estudar</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
